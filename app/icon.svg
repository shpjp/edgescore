<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark rounded background -->
  <rect width="32" height="32" rx="7" fill="#1f1f1f"/>
  <!-- E shape: left vertical bar -->
  <rect x="6" y="7" width="3" height="18" rx="1" fill="#c9a87c"/>
  <!-- E top bar (full width) -->
  <rect x="6" y="7" width="18" height="3" rx="1" fill="#c9a87c"/>
  <!-- E middle bar (shorter = score bar feel) -->
  <rect x="6" y="14.5" width="13" height="3" rx="1" fill="#c9a87c"/>
  <!-- E bottom bar (full width) -->
  <rect x="6" y="22" width="18" height="3" rx="1" fill="#c9a87c"/>
  <!-- Small score dot — top right corner accent -->
  <circle cx="26" cy="8" r="2.5" fill="#febc2e"/>
</svg>
